<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bientôt disponible — Angèle Phan</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0D0D14;
      color: #F0EEF8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.18;
      pointer-events: none;
    }

    .b1 { width: 400px; height: 400px; background: #7C3AED; top: -100px; left: -100px; }
    .b2 { width: 350px; height: 350px; background: #34D399; bottom: -80px; right: -80px; }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 3.5rem 4rem;
      max-width: 520px;
      width: 100%;
    }

    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #A78BFA, #34D399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: #9B97B8;
      font-size: 1rem;
      line-height: 1.7;
      font-weight: 300;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.25);
      color: #6EE7B7;
      font-size: 0.82rem;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      margin-bottom: 2rem;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #34D399;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.4; transform:scale(1.4); }
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #7C3AED, #34D399);
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 1.8rem;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(124,58,237,0.4);
    }
  </style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>

  <div class="card">
    <div class="icon">🚧</div>
    <div class="badge"><div class="dot"></div> En cours de développement</div>
    <h1>Bientôt disponible</h1>
    <p>
      Le code source de l'application d'apprentissage de vocabulaire anglais 
      est actuellement en cours de finalisation. Revenez bientôt !
    </p>
    <a href="index.html" class="back-btn">← Retour au portfolio</a>
  </div>
</body>
</html>
